{% extends 'shared/base.html' %}
{% block content %}

<h2>Change Password</h2>

<form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    {% for field in form %}
        <p>
            {{ field.label_tag }}<br>
            {{ field }}

            {% if field.errors %}
                <div style="color:red;">
                    {{ field.errors }}
                </div>
            {% endif %}
        </p>
    {% endfor %}

    <button class="btn btn-warning">Change</button>
</form>

{% endblock %}
